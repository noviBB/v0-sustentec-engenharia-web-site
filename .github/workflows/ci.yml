name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Fast, no-DB checks (run in parallel) --------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # next.config.mjs sets typescript.ignoreBuildErrors, so type-check here.
      - run: pnpm exec tsc --noEmit

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test

  # ---- Integration: Vitest RLS tests against the full Supabase stack -------
  # Uses the Supabase CLI stack (not a bare Postgres container) so auth.uid()
  # is the canonical platform function that reads `request.jwt.claims` the way
  # dbRls() sets it — a bare image's auth.uid() returns NULL and RLS allow-cases
  # would all fail.
  integration:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      CRON_SECRET: test-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase stack
        run: supabase start
      - name: Resolve Supabase keys from the running stack
        run: |
          set -euo pipefail
          eval "$(supabase status -o env)"          # defines ANON_KEY / SERVICE_ROLE_KEY
          echo "::add-mask::$ANON_KEY"
          echo "::add-mask::$SERVICE_ROLE_KEY"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
      - run: pnpm db:migrate
      # No db:seed — the RLS integration tests self-provision their tenants.
      - run: pnpm test:int

  # ---- Production build (artifact reused by e2e) ---------------------------
  build:
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      # `next build` collects page data for the API routes, which load the
      # config module and validate env. These only need to be present/valid —
      # dynamic routes don't open a DB connection at build. Keys via secrets.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SERVICE_ROLE_KEY }}
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      CRON_SECRET: test-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build

  # ---- End-to-end: Playwright against the local Supabase stack -------------
  e2e:
    runs-on: ubuntu-latest
    needs: build
    env:
      # Email -> Inbucket (the SMTP sink the local Supabase stack runs).
      EMAIL_PROVIDER: smtp
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: '54325'
      EMAIL_FROM: ci@example.com
      # Local stack endpoints.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      # Anon + service-role keys come from repo secrets. When unset, the
      # "Resolve Supabase keys" step below derives them from the running local
      # stack — so no key literal is ever committed to this file.
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SERVICE_ROLE_KEY }}
      CRON_SECRET: test-cron-secret
      # UPSTASH_* intentionally left unset — the rate limiter degrades to allow.
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase stack
        run: supabase start

      - name: Resolve Supabase keys from the running stack
        run: |
          set -euo pipefail
          # The locally-started stack is authoritative: its keys are signed with
          # the stack's JWT secret. Prefer them over any TEST_* secret (whose
          # demo keys won't verify against this stack -> 403 bad_jwt at seed).
          eval "$(supabase status -o env)"          # defines ANON_KEY / SERVICE_ROLE_KEY
          echo "::add-mask::$ANON_KEY"
          echo "::add-mask::$SERVICE_ROLE_KEY"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - run: pnpm db:migrate
      # seed:auth creates the GoTrue users that db:seed (seed-data) looks up.
      - run: pnpm seed:auth
      - run: pnpm db:seed

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      # No artifact download — the Playwright webServer runs `pnpm build &&
      # pnpm start`, so it builds .next itself with the resolved env.
      - name: Run Playwright tests
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
